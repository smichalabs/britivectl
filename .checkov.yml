# checkov configuration for britivectl
#
# infra/ hosts a static MkDocs documentation site on S3 + CloudFront.
# The skipped checks below are inappropriate for a public docs bucket
# serving static HTML over CloudFront with OAC.

framework: terraform
directory: infra/
compact: true
quiet: true

skip-check:
  # WAF -- public docs site, no dynamic content to protect
  - CKV_AWS_68    # CloudFront WAF
  - CKV2_AWS_47   # CloudFront WAFv2 Log4j AMR

  # S3 cross-region replication -- docs are rebuilt from source on deploy
  - CKV_AWS_144

  # S3 KMS encryption -- bucket holds public HTML, SSE-S3 is sufficient
  - CKV_AWS_145

  # S3 versioning -- docs are overwritten on every deploy, no rollback needed
  - CKV_AWS_21

  # S3 lifecycle policy -- deploy does --delete sync, no stale objects
  - CKV2_AWS_61

  # S3 event notifications -- no downstream consumers for a docs bucket
  - CKV2_AWS_62

  # S3 access logging -- CloudFront handles access logs if needed
  - CKV_AWS_18

  # CloudFront origin failover -- single S3 origin, no failover target
  - CKV_AWS_310

  # CloudFront geo restriction -- public docs, no geo-blocking needed
  - CKV_AWS_374

  # CloudFront response headers policy -- static site, default headers are fine
  - CKV2_AWS_32

  # CloudFront access logging -- low-traffic docs site, not worth a logging bucket
  - CKV_AWS_86

  # CloudFront default root object -- intentionally removed; root will be a
  # separate homepage later, docs live under /utils/bctl/
  - CKV_AWS_305
