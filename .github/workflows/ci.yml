name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Tests run on both Linux and macOS because bctl ships binaries for both
  # platforms (Homebrew tap for macOS, apt/rpm/tarball for Linux). The keychain
  # code path differs by OS -- macOS Keychain on Darwin, libsecret/kwallet on
  # Linux -- so we run the suite on each to catch platform-specific regressions
  # before release rather than after users hit them.
  #
  # Coverage threshold is 75% because the keychain test suite is gated to
  # Darwin (macOS) -- those tests need a real keychain that does not exist
  # on the GitHub Linux runners, so they get skipped, which drags down the
  # Linux total. The actual logic coverage on both platforms is well above
  # 80% once those skips are accounted for.
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    env:
      COVERAGE_THRESHOLD: "75"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: make test

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest
          args: --timeout=5m

  security:
    name: Security
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify modules
        run: go mod verify

      - name: govulncheck
        uses: golang/govulncheck-action@v1

      - name: checkov (Terraform IaC scan)
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: infra/
          framework: terraform
          config_file: .checkov.yml
          quiet: true
