name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Tests run on both Linux and macOS because bctl ships binaries for both
  # platforms (Homebrew tap for macOS, apt/rpm/tarball for Linux). The keychain
  # code path differs by OS -- macOS Keychain on Darwin, libsecret/kwallet on
  # Linux -- so we run the suite on each to catch platform-specific regressions
  # before release rather than after users hit them.
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            coverage_threshold: 85
          - os: macos-latest
            coverage_threshold: 90

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: make test
        env:
          COVERAGE_THRESHOLD: ${{ matrix.coverage_threshold }}

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest
          args: --timeout=5m
          verify: false

  security:
    name: Security
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          cache: pip

      - name: Verify modules
        run: go mod verify

      - name: govulncheck
        uses: golang/govulncheck-action@v1

      - name: Install checkov
        run: pip install checkov

      - name: checkov (Terraform IaC scan)
        run: checkov --config-file .checkov.yml
