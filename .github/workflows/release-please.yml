name: Release Please

on:
  push:
    branches: [main]
  # workflow_dispatch lets a maintainer manually trigger release-please
  # from the Actions tab. Useful when only chore/docs commits have landed
  # since the last tag but we still want to ship (for example, to publish
  # supply chain artifacts that piggyback on a chore commit).
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json
