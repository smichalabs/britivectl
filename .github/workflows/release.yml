name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  # id-token: write is required for cosign keyless signing via the OIDC
  # token issued by GitHub during the workflow run.
  id-token: write

jobs:
  release:
    name: Release
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # Install syft so goreleaser can generate CycloneDX SBOMs for each
      # archive. Pinned to a specific version for reproducible CI runs.
      - name: Install syft (SBOM generator)
        uses: anchore/sbom-action/download-syft@v0.17.7

      # Install cosign so goreleaser can sign the checksums file with
      # keyless OIDC signing. Pinned for reproducibility.
      - name: Install cosign
        uses: sigstore/cosign-installer@v3.7.0

      - name: Generate completions
        run: make completions

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          # Pin to a major version so reproducible builds are not silently
          # broken by an upstream goreleaser release.
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASES_GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
