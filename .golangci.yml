version: "2"

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - revive

  settings:
    goimports:
      local-prefixes: github.com/smichalabs/britivectl
    revive:
      rules:
        - name: exported
          severity: warning
        - name: var-naming
          severity: warning

issues:
  exclude-rules:
    - path: "_test.go"
      linters:
        - errcheck
        - revive
    - path: "cmd/"
      linters:
        - revive

  max-issues-per-linter: 50
  max-same-issues: 5
