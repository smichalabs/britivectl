version: 2

project_name: bctl

before:
  hooks:
    - go mod tidy

builds:
  - id: bctl
    main: .
    binary: bctl
    env:
      - CGO_ENABLED=0
    flags:
      # -trimpath strips local file paths from the binary so panics and
      # error traces do not leak the build host's directory layout.
      - -trimpath
      # -buildvcs=true embeds the source repository's commit and revision
      # info into the binary. Inspect with: go version -m bctl
      - -buildvcs=true
    ldflags:
      - -s -w
      - -X github.com/smichalabs/britivectl/pkg/version.Version={{.Version}}
      - -X github.com/smichalabs/britivectl/pkg/version.Commit={{.Commit}}
      - -X github.com/smichalabs/britivectl/pkg/version.BuildDate={{.Date}}
    # mod_timestamp pins file mtimes to the commit time so two builds of
    # the same source produce identical archives (reproducible builds).
    mod_timestamp: '{{ .CommitTimestamp }}'
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - id: bctl
    formats:
      - tar.gz
    name_template: "bctl_{{ .Os | title }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md
      - completions/*

# .deb (Debian/Ubuntu/WSL) and .rpm (RHEL/Fedora/CentOS) packages
nfpms:
  - id: bctl
    package_name: bctl
    vendor: smichalabs
    homepage: https://github.com/smichalabs/britivectl
    maintainer: Sajeeve <sajeeve@gmail.com>
    description: A polished CLI for Britive JIT access management
    license: MIT
    formats:
      - deb
      - rpm
      - apk
    bindir: /usr/bin
    contents:
      - src: completions/bctl.bash
        dst: /usr/share/bash-completion/completions/bctl
      - src: completions/bctl.zsh
        dst: /usr/share/zsh/vendor-completions/_bctl
      - src: completions/bctl.fish
        dst: /usr/share/fish/vendor_completions.d/bctl.fish

release:
  github:
    owner: smichalabs
    name: britivectl-releases

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

# Generate a CycloneDX SBOM for every release artifact via syft. The SBOM
# is attached to the GitHub release alongside the binaries so downstream
# consumers (and security scanners) can audit the dependency tree.
sboms:
  - id: archive
    artifacts: archive
    documents:
      - "${artifact}.sbom.json"

# Sign release artifacts and the checksums file with cosign keyless mode.
# This produces .sig and .pem files that anyone can verify with:
#   cosign verify-blob --certificate <pem> --signature <sig> <artifact> \
#     --certificate-identity-regexp 'https://github.com/smichalabs/britivectl' \
#     --certificate-oidc-issuer 'https://token.actions.githubusercontent.com'
# Keyless signing uses the GitHub OIDC token issued during the workflow run,
# so there is no long-lived key to rotate or leak.
signs:
  - cmd: cosign
    certificate: '${artifact}.pem'
    args:
      - sign-blob
      - '--output-certificate=${certificate}'
      - '--output-signature=${signature}'
      - '${artifact}'
      - --yes
    artifacts: checksum
    output: true

snapshot:
  version_template: "{{ .Tag }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

# Homebrew tap — macOS
brews:
  - name: bctl
    repository:
      owner: smichalabs
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    commit_msg_template: "chore: update bctl to {{ .Tag }}"
    homepage: https://github.com/smichalabs/britivectl-releases
    description: A polished CLI for Britive JIT access management
    license: MIT
    install: |
      bin.install "bctl"
      bash_completion.install "completions/bctl.bash" => "bctl"
      zsh_completion.install "completions/bctl.zsh" => "_bctl"
      fish_completion.install "completions/bctl.fish"
    test: |
      system "#{bin}/bctl", "version"
